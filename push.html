<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Push task — Personal OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b0b0f;color:#d8d8ec;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#161620;border:1px solid #1e1e2e;border-radius:12px;padding:28px;width:100%;max-width:440px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.dot{width:8px;height:8px;border-radius:50%;background:#3b5bdb;flex-shrink:0;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.board-link{font-size:11px;color:#3b5bdb;text-decoration:none;margin-left:auto;font-family:monospace;letter-spacing:.05em}
.board-link:hover{color:#7090dd}
.label{font-size:10px;font-family:monospace;letter-spacing:.15em;color:#404060;margin-bottom:6px}
.title{font-size:16px;font-weight:500;color:#d8d8ec;line-height:1.4;margin-bottom:16px;padding:12px 14px;background:#0f0f1a;border:1px solid #1e1e2e;border-radius:8px}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500;font-family:monospace}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.btn-push{background:#1a2e50;color:#7aabee;border:1px solid #2a4a80}
.btn-push:hover{background:#1e3860}
.btn-push:disabled{opacity:.5;cursor:not-allowed}
.btn-success{background:#1a3a1a;color:#5aaa5a;border:1px solid #2a5a2a}
.btn-error{background:#3a1a1a;color:#cc5a5a;border:1px solid #5a2a2a}
.status{font-size:12px;color:#404060;text-align:center;margin-top:12px;font-family:monospace;min-height:18px}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:#404060;text-decoration:none;font-family:monospace}
.back:hover{color:#7090dd}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="dot"></span>
    <span style="font-size:11px;font-weight:600;letter-spacing:.15em;color:#6060a0;font-family:monospace">PERSONAL OS</span>
    <a class="board-link" href="https://bupa-delivery.vercel.app">Open board ↗</a>
  </div>
  <div class="label">TASK TO ADD</div>
  <div class="title" id="task-title">Loading…</div>
  <div class="meta" id="task-meta"></div>
  <button class="btn btn-push" id="push-btn" onclick="push()">Push to board</button>
  <div class="status" id="status"></div>
  <a class="back" href="https://bupa-delivery.vercel.app">← Back to board</a>
</div>

<script type="module">
import { initializeApp }                                    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc }                from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCHBPkgIMiGKmNt8B2JIoxsQ1Jc5mAnTBg",
  authDomain:        "bupa-delivery.firebaseapp.com",
  projectId:         "bupa-delivery",
  storageBucket:     "bupa-delivery.firebasestorage.app",
  messagingSenderId: "537687117293",
  appId:             "1:537687117293:web:7eb4dacb3919c66aaf2be4"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const boardRef = doc(db, 'kanban', 'board');

const INIT_COLORS = {
  ro:'#3b82f6',th:'#a855f7',au:'#f97316',
  do:'#22c55e',tc:'#ef4444',qp:'#eab308',
  bc:'#60a5fa',md:'#2dd4bf',un:'#6060a0'
};
const INIT_NAMES = {
  ro:'#ReleaseOps',th:'#Theseus',au:'#Automation',
  do:'#DORA',tc:'#TeamCulture',qp:'#QPlanning',
  bc:'#BCC',md:'#MyDev',un:'Untagged'
};

// Parse task from URL params
const p      = new URLSearchParams(window.location.search);
const task   = {
  id:           p.get('id')           || 't' + Date.now(),
  title:        p.get('title')        || 'Untitled task',
  tag:          p.get('tag')          || 'Untagged',
  iid:          p.get('iid')          || 'un',
  impact:       parseInt(p.get('impact') || '3'),
  deadline_raw: p.get('deadline_raw') || '',
  due_date:     p.get('due_date')     || null,
  col:          p.get('col')          || 'next',
  pin:          p.get('pin')          === 'true',
};

// Render task preview
document.getElementById('task-title').textContent = task.title;
const meta  = document.getElementById('task-meta');
const color = INIT_COLORS[task.iid] || '#6060a0';
const name  = INIT_NAMES[task.iid]  || 'Untagged';
const colLabel = {next:'Next', planned:'Planned', ideas:'Ideas'};

[
  [name,          color],
  [task.pin ? 'Now (pinned)' : colLabel[task.col], null],
  [task.deadline_raw || 'No deadline', null],
].forEach(([text, c]) => {
  const pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = text;
  pill.style.background = c ? c + '22' : '#1e1e38';
  pill.style.color      = c ? c        : '#505080';
  meta.appendChild(pill);
});

// Push to Firestore
window.push = async function() {
  const btn    = document.getElementById('push-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Pushing…';
  status.textContent = '';

  try {
    const snap = await getDoc(boardRef);
    if (!snap.exists()) throw new Error('Board not found in Firestore');

    const data  = snap.data();
    const tasks = data.tasks || [];
    const done  = data.done  || [];

    if (tasks.find(t => t.id === task.id)) {
      btn.className   = 'btn btn-error';
      btn.textContent = 'Already on board';
      status.textContent = 'A task with this id already exists.';
      return;
    }

    tasks.push(task);
    await setDoc(boardRef, { tasks, done });

    btn.className   = 'btn btn-success';
    btn.textContent = 'Done — task added!';
    status.textContent = tasks.length + ' tasks on board. You can close this tab.';

  } catch(e) {
    btn.disabled    = false;
    btn.className   = 'btn btn-error';
    btn.textContent = 'Error — try again';
    status.textContent = e.message;
    setTimeout(() => {
      btn.className   = 'btn btn-push';
      btn.textContent = 'Push to board';
    }, 3000);
  }
};
</script>
</body>
</html>
